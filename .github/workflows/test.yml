name: 🧪 Build and Test [CRON]

on:
  schedule:
    - cron: '0 9 * * TUE'


jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: 🧪 Build and Test

    steps:
      - uses: actions/checkout@v6

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'yarn'

      - name: 📦 Install dependencies
        run: yarn install --immutable

      - name: 🏗️ Build app
        run: yarn build

      - name: 🧪 Tests
        run: yarn test:coverage
